services:
  - type: web
    name: conectapet-api
    runtime: go
    buildCommand: go build -o api ./cmd/api/main.go
    startCommand: ./api
    envVars:
      - key: DATABASE_URL
        sync: false        # preencher manualmente no dashboard do Render
      - key: JWT_SECRET
        generateValue: true  # Render gera automaticamente
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false        # preencher manualmente
      - key: FRONTEND_URL
        sync: false        # ex: https://conectapet.vercel.app
      - key: GIN_MODE
        value: release
